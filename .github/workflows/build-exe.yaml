name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# 🔪 核心优化 1：强制启用 Node 24 环境
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code (拉取代码)
      uses: actions/checkout@v4

    - name: Set up Python (配置 Python 环境)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies (安装依赖)
      run: |
        python -m pip install --upgrade pip setuptools wheel
        if (Test-Path "requirements.txt") {
          pip install -r requirements.txt
        } else {
          Write-Host "执行手动保底安装..."
          pip install uiautomator2 pillow requests lxml
        }
        # 确保安装 pyinstaller
        pip install pyinstaller

    - name: Build with PyInstaller (极致瘦身打包)
      run: |
        # 🔪 关键修复：使用 python -m PyInstaller 代替直接输入 pyinstaller
        # 这样可以解决 Windows 环境下找不到命令的问题
        python -m PyInstaller --onefile --clean --name QQMusicLiveBot `
                    --collect-data uiautomator2 `
                    --exclude-module tkinter `
                    --exclude-module pandas `
                    --exclude-module numpy `
                    --exclude-module matplotlib `
                    --exclude-module PyQt5 `
                    --exclude-module IPython `
                    --exclude-module notebook `
                    --exclude-module PIL.ImageQt `
                    run_v1_bot.py

    - name: Upload Artifact (上传生成的 EXE)
      uses: actions/upload-artifact@v4
      with:
        name: QQMusic-Live-Bot-Windows-x64
        path: dist/QQMusicLiveBot.exe