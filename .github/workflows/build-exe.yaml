name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ] # 当推送到 main 或 master 分支时触发
  workflow_dispatch: # 允许你在 GitHub 网页上通过按钮手动触发

jobs:
  build:
    runs-on: windows-latest # 核心：分配一台最新的 Windows 云服务器

    steps:
    - name: Checkout Code (拉取代码)
      uses: actions/checkout@v4

    - name: Set up Python (配置 Python 环境)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 与你本地开发环境保持一致
        cache: 'pip'

    - name: Install Dependencies (安装依赖)
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        # 安装 PyInstaller 打包工具
        pip install pyinstaller

    - name: Build with PyInstaller (执行打包)
      run: |
        # --onefile: 打包成单个 exe
        # --clean: 清理缓存
        # --name: 指定输出的 exe 名字
        pyinstaller --onefile --clean --name QQMusicLiveBot run_v1_bot.py

    - name: Upload Artifact (上传生成的 EXE)
      uses: actions/upload-artifact@v4
      with:
        name: QQMusic-Live-Bot-Windows-x64
        path: dist/QQMusicLiveBot.exe